<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TestOps Platform — HW-LAB-PL-01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   TestOps Platform — restyled in the Linear design language
   Near-black surfaces · #5E6AD2 accent · Inter · subtle borders
   ============================================================ */
:root{
  --bg:#08090A;          /* app background (near-black) */
  --bg-2:#0B0C0E;        /* rail / topbar chrome */
  --panel:#0E0F11;       /* card surface */
  --panel-2:#141517;     /* nested surface */
  --panel-3:#1B1C1F;     /* hover / active */
  --line:rgba(255,255,255,.07);   /* hairline */
  --line-2:rgba(255,255,255,.11);  /* stronger divider / control border */
  --ink:#F7F8F8;         /* primary text */
  --ink-2:#8A8F98;       /* secondary (Linear gray) */
  --ink-3:#62666D;       /* tertiary */
  --ink-4:#42454B;       /* faint */

  --brand:#828BF5;       /* purple — legible accent text/icons */
  --brand-2:#A2A9F8;
  --brand-3:#C3C8FB;
  --brand-cta:#5E6AD2;   /* Linear purple — primary button fill */
  --brand-dim:rgba(94,106,210,.16);
  --brand-glow:rgba(94,106,210,.30);
  --accent:#FC7840;      /* orange — occasional data accent */
  --accent-2:#FF9466;
  --accent-dim:rgba(252,120,64,.15);

  --ok:#68CC8C;          /* green */
  --ok-dim:rgba(104,204,140,.14);
  --mid:#4EA7FC;         /* blue */
  --mid-dim:rgba(78,167,252,.15);
  --low:#6E7178;         /* grey */
  --low-dim:rgba(110,113,120,.16);
  --warn:#F2C94C;        /* yellow/amber */
  --warn-dim:rgba(242,201,76,.14);
  --bad:#EB5757;         /* red */
  --bad-dim:rgba(235,87,87,.14);
  --sig:#5E6AD2; --sig-glow:rgba(94,106,210,.30);

  --r-sm:5px; --r:8px; --r-lg:12px;
  --rail:224px;
  --hl:inset 0 1px 0 0 rgba(255,255,255,.04);
  --shadow:0 1px 2px rgba(0,0,0,.20);
  --shadow-lg:0 16px 48px rgba(0,0,0,.6);
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --disp:"Inter",system-ui,sans-serif;
  --ui:"Inter",system-ui,sans-serif;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:var(--ui);
  color:var(--ink);
  background:
    radial-gradient(900px 480px at 78% -12%, rgba(94,106,210,.07), transparent 62%),
    var(--bg);
  -webkit-font-smoothing:antialiased;
  font-size:13.5px;line-height:1.5;letter-spacing:-.003em;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
::selection{background:var(--brand-dim);color:var(--ink)}

*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:20px;border:2px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:var(--ink-4);background-clip:content-box}

/* ============================================================ shell */
.app{display:grid;grid-template-columns:var(--rail) 1fr;min-height:100vh;position:relative;z-index:1}

.rail{
  position:sticky;top:0;height:100vh;background:var(--bg-2);
  border-right:1px solid var(--line);display:flex;flex-direction:column;
  padding:14px 10px 12px;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 2px}
.brand .wm{font-family:var(--ui);font-weight:600;font-size:15px;letter-spacing:-.02em;color:var(--ink)}
.brand .wm b{color:var(--brand);font-weight:600}
.brand .sub{font-family:var(--ui);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-top:1px;font-weight:500}
.tagline{font-size:11.5px;color:var(--ink-3);padding:8px 9px 4px}

.nav-group-label{font-family:var(--ui);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);padding:16px 9px 5px;font-weight:510}
.nav-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:6px 9px;border-radius:6px;color:var(--ink-2);font-size:13px;font-weight:500;position:relative;transition:.1s}
.nav-item svg{flex:0 0 16px;width:16px;height:16px;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--ink)}
.nav-item.active{background:var(--panel-3);color:var(--ink);font-weight:550}
.nav-item.active svg{opacity:1;color:var(--brand)}
.nav-item .badge{margin-left:auto;font-family:var(--ui);font-size:10.5px;background:rgba(255,255,255,.08);color:var(--ink-2);border-radius:5px;padding:1px 6px;font-weight:500}
.nav-item.soon{color:var(--ink-3)}
.nav-item.soon .badge{background:rgba(255,255,255,.06);color:var(--ink-3)}

.rail-foot{margin-top:auto;border-top:1px solid var(--line);padding-top:10px}
.who{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:6px}
.who:hover{background:rgba(255,255,255,.05)}
.avatar{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#3a3f63,#23263b);display:grid;place-items:center;font-family:var(--ui);font-weight:600;font-size:11px;color:var(--brand-2);border:1px solid var(--line-2)}
.who .nm{font-size:12.5px;font-weight:550;line-height:1.15}
.who .rl{font-family:var(--ui);font-size:11px;color:var(--ink-3)}
.spyro{font-family:var(--ui);font-size:9.5px;letter-spacing:.06em;color:var(--ink-4);padding:10px 8px 2px;text-transform:uppercase;font-weight:500}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:10px 20px;background:rgba(8,9,10,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.crumbs{font-family:var(--ui);font-size:13px;color:var(--ink-3);white-space:nowrap;font-weight:450}
.crumbs b{color:var(--ink);font-weight:550}

.query{flex:1;max-width:520px;position:relative}
.query input{width:100%;height:32px;border-radius:6px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);font-family:var(--ui);font-size:13px;padding:0 14px 0 34px;transition:.12s}
.query input::placeholder{color:var(--ink-3)}
.query input:focus{outline:none;border-color:var(--brand-cta);box-shadow:0 0 0 3px var(--brand-dim)}
.query .qicon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
.query .kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--ui);font-size:10.5px;color:var(--ink-3);border:1px solid var(--line);border-radius:4px;padding:1px 6px;background:var(--panel-3)}

.top-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.status-pill{display:flex;align-items:center;gap:8px;font-family:var(--ui);font-size:11.5px;color:var(--ink-2);border:1px solid var(--line);background:var(--panel-2);border-radius:6px;padding:6px 11px}
.status-pill .mono,.status-pill b{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink-2)}
.dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.dot.ok{background:var(--ok)} .dot.mid{background:var(--mid)} .dot.low{background:var(--low)}
.dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)} .dot.brand{background:var(--brand)}
.dot.live{background:var(--ok);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--ok-dim)}50%{box-shadow:0 0 0 5px rgba(104,204,140,0)}}
.iconbtn{width:32px;height:32px;border-radius:6px;border:1px solid transparent;background:transparent;display:grid;place-items:center;color:var(--ink-2);position:relative;transition:.1s}
.iconbtn:hover{color:var(--ink);background:rgba(255,255,255,.05)}
.iconbtn .nd{position:absolute;top:6px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--brand-cta);border:1.5px solid var(--bg-2)}

.content{padding:22px;max-width:1500px;width:100%}
.screen{display:none;animation:fade .2s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.kicker{font-family:var(--ui);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:550;margin-bottom:7px}
.page-head h1{font-family:var(--ui);font-weight:600;font-size:22px;letter-spacing:-.022em;margin:0;color:var(--ink)}
.page-head .lede{color:var(--ink-2);font-size:13px;margin-top:5px}
.head-actions{display:flex;gap:8px;align-items:center}
.live-pill{display:inline-flex;align-items:center;gap:7px;font-family:var(--ui);font-size:11.5px;font-weight:550;color:var(--ok);border:1px solid rgba(104,204,140,.4);border-radius:6px;padding:6px 11px;letter-spacing:.02em}

.btn{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px;border-radius:6px;font-size:13px;font-weight:500;border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink);transition:.1s;box-shadow:var(--hl)}
.btn:hover{background:var(--panel-3)}
.btn.primary{background:var(--brand-cta);color:#fff;border-color:transparent;font-weight:550;box-shadow:var(--hl),0 1px 2px rgba(0,0,0,.3)}
.btn.primary:hover{background:#6b76db}
.btn.accent{background:var(--panel-3);color:var(--ink);border-color:var(--line-2);font-weight:500}
.btn.accent:hover{background:#26282c}
.btn.ghost{background:transparent;border-color:transparent;box-shadow:none;color:var(--ink-2)}
.btn.ghost:hover{background:rgba(255,255,255,.05);color:var(--ink)}
.btn.danger{color:var(--bad);border-color:rgba(235,87,87,.35);background:transparent;box-shadow:none}
.btn.danger:hover{background:var(--bad-dim)}
.btn.sm{height:28px;padding:0 10px;font-size:12.5px}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--hl)}
.panel-h{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line)}
.panel-h h3{margin:0;font-size:13px;font-weight:600;font-family:var(--ui);letter-spacing:-.01em}
.eyebrow{font-family:var(--ui);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);font-weight:510}
.panel-b{padding:16px}

.grid{display:grid;gap:16px}
.g-12{grid-template-columns:repeat(12,1fr)}
.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}
.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}
.span-9{grid-column:span 9}.span-12{grid-column:span 12}

/* KPI */
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:15px 17px;box-shadow:var(--hl);text-align:left}
.kpi .lab{font-size:12.5px;color:var(--ink-2);font-weight:500}
.kpi .val{font-family:var(--ui);font-weight:600;font-size:30px;line-height:1.05;letter-spacing:-.03em;font-variant-numeric:tabular-nums;margin:8px 0 6px}
.kpi .val small{font-size:15px;color:var(--ink-3);font-weight:500}
.kpi .delta{font-family:var(--ui);font-size:11.5px;display:inline-flex;align-items:center;gap:4px;font-weight:500}
.delta.up{color:var(--ok)} .delta.down{color:var(--bad)} .delta.flat{color:var(--ink-3)}

/* heatmap */
.heat{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}
.bed{border:1px solid var(--line);border-radius:8px;padding:12px 10px;background:var(--panel-2);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:.12s;text-align:center}
.bed:hover{border-color:var(--line-2);transform:translateY(-1px)}
.bed .load{font-family:var(--ui);font-weight:600;font-size:21px;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1}
.bed .bid{font-family:var(--mono);font-size:10px;color:var(--ink-3)}
.bed.s-high{background:var(--ok-dim)} .bed.s-high .load{color:var(--ok)}
.bed.s-mid{background:var(--mid-dim)} .bed.s-mid .load{color:var(--mid)}
.bed.s-low{background:var(--low-dim)} .bed.s-low .load{color:var(--ink-3)}
.bed.s-maint{background:var(--warn-dim)} .bed.s-maint .load{color:var(--warn);font-size:13px;letter-spacing:.04em;font-family:var(--mono);font-weight:600}
.bed.s-error{background:var(--bad-dim)} .bed.s-error .load{color:var(--bad);font-size:15px;letter-spacing:.06em;font-family:var(--mono);font-weight:600}

/* active campaigns mini list */
.acrow{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.acrow:last-child{border-bottom:0}
.acrow .nm{font-size:13px;font-weight:500}
.acrow .beds{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.acrow .pct{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--ink-2);min-width:40px;text-align:right;font-variant-numeric:tabular-nums}

/* phase bars */
.barrow{display:grid;grid-template-columns:96px 1fr 42px;gap:12px;align-items:center;padding:6px 0}
.barrow .nm{font-size:12.5px;color:var(--ink-2)}
.barrow .track{height:6px;border-radius:4px;background:var(--panel-3);overflow:hidden}
.barrow .track i{display:block;height:100%;border-radius:4px}
.barrow .pct{font-family:var(--ui);font-size:12px;text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:var(--ink-2)}

/* alerts */
.alert{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.alert:last-child{border-bottom:0}
.alert .ad{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:0 0 auto}
.alert .ttl{font-size:12.5px;font-weight:450;line-height:1.4}
.alert .meta{font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:2px}
.alert .when{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--ink-4);white-space:nowrap}

/* AI insight rows */
.ai-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:7px;margin-bottom:8px;background:var(--panel-2)}
.ai-row .l{font-size:12.5px;font-weight:500}
.ai-row .r{font-family:var(--ui);font-size:12px;font-weight:600}
.ai-tip{display:flex;gap:9px;align-items:flex-start;font-size:12px;color:var(--ink-2);padding:10px 12px;background:var(--brand-dim);border-radius:7px;line-height:1.45}

/* tables */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:var(--ui);font-size:11px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-3);text-align:left;padding:9px 14px;border-bottom:1px solid var(--line);font-weight:510;white-space:nowrap}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
.tbl tbody tr{transition:.1s}
.tbl tbody tr:hover{background:rgba(255,255,255,.025)}
.tbl tbody tr.clickable{cursor:pointer}
.tbl .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12px}
.tbl .id{font-family:var(--ui);font-size:12.5px;color:var(--ink-3);font-weight:500}

.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--ui);font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:6px;border:1px solid transparent;white-space:nowrap;letter-spacing:0}
.chip .dot{width:6px;height:6px}
.chip.ok{color:var(--ok);background:var(--ok-dim)} .chip.warn{color:var(--warn);background:var(--warn-dim)}
.chip.bad{color:var(--bad);background:var(--bad-dim)} .chip.mid{color:var(--mid);background:var(--mid-dim)}
.chip.brand{color:var(--brand-2);background:var(--brand-dim)} .chip.accent{color:var(--accent);background:var(--accent-dim)}
.chip.mute{color:var(--ink-2);background:rgba(255,255,255,.06)}

.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.fchip{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 11px;border-radius:6px;border:1px solid var(--line);background:transparent;font-size:12.5px;color:var(--ink-2);transition:.1s}
.fchip:hover{color:var(--ink);background:rgba(255,255,255,.04)}
.fchip.on{background:var(--panel-3);border-color:var(--line-2);color:var(--ink);font-weight:550}
.search-mini{position:relative;flex:1;min-width:180px;max-width:300px}
.search-mini input{width:100%;height:30px;border-radius:6px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);padding:0 10px 0 31px;font-size:12.5px;font-family:var(--ui)}
.search-mini input:focus{outline:none;border-color:var(--brand-cta);box-shadow:0 0 0 3px var(--brand-dim)}
.search-mini svg{position:absolute;left:9px;top:7px;color:var(--ink-3)}

.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px}
.tab{padding:8px 13px;font-size:13px;color:var(--ink-2);border-bottom:1.5px solid transparent;font-weight:500;margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--ink);border-bottom-color:var(--brand-cta);font-weight:550}

/* drawer */
.scrim{position:fixed;inset:0;background:rgba(4,5,6,.6);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:.2s}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(560px,94vw);background:var(--bg-2);border-left:1px solid var(--line-2);z-index:50;transform:translateX(100%);transition:transform .26s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.drawer.open{transform:none}
.drawer-h{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:14px}
.drawer-b{padding:20px;overflow-y:auto;flex:1}
.drawer-x{margin-left:auto;width:30px;height:30px;border-radius:6px;border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-2)}
.drawer-x:hover{background:rgba(255,255,255,.05);color:var(--ink)}
.spec{display:grid;grid-template-columns:130px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.spec .k{font-family:var(--ui);font-size:12px;color:var(--ink-3)}
.spec .v.mono{font-family:var(--mono);font-size:12px}

.tl{position:relative;padding-left:22px}
.tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:1.5px;background:var(--line-2)}
.tl-item{position:relative;padding:0 0 16px}
.tl-item::before{content:"";position:absolute;left:-21px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--bg-2);border:2px solid var(--brand-cta)}
.tl-item.bad::before{border-color:var(--bad)} .tl-item.ok::before{border-color:var(--ok)} .tl-item.warn::before{border-color:var(--warn)}
.tl-item .t{font-size:13px;font-weight:500}
.tl-item .d{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:1px}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start}
.kcol{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);min-height:160px;box-shadow:var(--hl)}
.kcol-h{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid var(--line)}
.kcol-h .nm{font-size:12.5px;font-weight:600;font-family:var(--ui)}
.kcol-h .ct{margin-left:auto;font-family:var(--ui);font-size:11px;color:var(--ink-3);background:rgba(255,255,255,.06);padding:1px 7px;border-radius:5px}
.kcol-b{padding:9px;display:flex;flex-direction:column;gap:9px}
.kcard{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:11px;cursor:pointer;transition:.12s}
.kcard:hover{border-color:var(--line-2);background:var(--panel-3)}
.kcard .kid{font-family:var(--mono);font-size:10px;color:var(--ink-3)}
.kcard .ktitle{font-size:13px;font-weight:500;margin:3px 0 9px;line-height:1.3}
.kcard .kfoot{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--ink-3)}
.kcard .prog{height:4px;border-radius:3px;background:var(--panel-3);overflow:hidden;margin:9px 0 4px}
.kcard .prog i{display:block;height:100%;background:var(--brand-cta)}
.avatars{display:flex}
.avatars .a{width:20px;height:20px;border-radius:5px;background:var(--panel-3);color:var(--brand-2);border:1.5px solid var(--panel-2);display:grid;place-items:center;font-family:var(--ui);font-size:9px;font-weight:600;margin-left:-6px}
.avatars .a:first-child{margin-left:0}

/* recommendation cards */
.rec{display:grid;grid-template-columns:42px 1fr;gap:14px;padding:16px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);align-items:start;box-shadow:var(--hl)}
.rec .ric{width:42px;height:42px;border-radius:9px;display:grid;place-items:center}
.rec.invest .ric{background:var(--ok-dim);color:var(--ok)} .rec.cut .ric{background:var(--warn-dim);color:var(--warn)} .rec.risk .ric{background:var(--bad-dim);color:var(--bad)}
.rec .rt{font-size:14px;font-weight:600;font-family:var(--ui);letter-spacing:-.01em}
.rec .rd{font-size:12.5px;color:var(--ink-2);margin-top:5px;line-height:1.5}
.rec .rimpact{font-family:var(--ui);font-size:11.5px;margin-top:9px;display:inline-flex;gap:6px;align-items:center;color:var(--ink-3)}
.rec .rimpact b{color:var(--ink);font-weight:550}

/* NL answer */
.nl-answer{border:1px solid rgba(94,106,210,.3);background:var(--brand-dim);border-radius:var(--r);padding:16px;margin-bottom:18px}
.nl-q{font-family:var(--ui);font-size:12.5px;color:var(--brand-2);margin-bottom:10px;display:flex;gap:8px;align-items:center;font-weight:550}
.nl-summary{font-size:13.5px;line-height:1.55;color:var(--ink)}

/* integration badges */
.integ{display:flex;gap:7px;flex-wrap:wrap}
.ibadge{display:inline-flex;align-items:center;gap:7px;font-family:var(--ui);font-size:11.5px;padding:5px 10px;border-radius:6px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink-2)}
.ibadge .sd{width:6px;height:6px;border-radius:50%;background:var(--ok)}

/* toast */
.toasts{position:fixed;bottom:22px;right:22px;z-index:80;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:11px;background:#1C1D20;border:1px solid var(--line-2);border-radius:8px;padding:11px 14px;box-shadow:var(--shadow-lg);min-width:280px;animation:slidein .25s ease}
.toast .ti{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;flex:0 0 auto;background:var(--ok-dim);color:var(--ok)}
.toast.info .ti{background:var(--brand-dim);color:var(--brand)}
.toast .tx{font-size:13px;font-weight:500} .toast .ts{font-family:var(--ui);font-size:11px;color:var(--ink-3)}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}

/* remote */
.remote{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rbtn{display:flex;align-items:center;gap:10px;padding:12px 13px;border:1px solid var(--line);border-radius:7px;background:var(--panel-2);font-size:13px;font-weight:500;text-align:left}
.rbtn:hover{background:var(--panel-3)}
.rbtn .ri{width:30px;height:30px;border-radius:7px;background:var(--brand-dim);display:grid;place-items:center;color:var(--brand)}
.rbtn.warn .ri{background:var(--warn-dim);color:var(--warn)} .rbtn.bad .ri{background:var(--bad-dim);color:var(--bad)}
.rbtn small{display:block;font-family:var(--mono);font-size:10px;color:var(--ink-3);font-weight:400}
.mt{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:14px}
.mt .lab{font-family:var(--ui);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);font-weight:510}
.mt .v{font-family:var(--ui);font-weight:600;font-size:25px;font-variant-numeric:tabular-nums;margin-top:5px;letter-spacing:-.03em}
.mt .v small{font-size:13px;color:var(--ink-3);font-weight:500}

.topo{position:relative;height:360px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel-2);overflow:hidden}

/* roadmap */
.road{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.road-card{border:1px solid var(--line);border-radius:var(--r);padding:20px;background:var(--panel);box-shadow:var(--hl);position:relative}
.road-card .ic{width:42px;height:42px;border-radius:10px;background:var(--brand-dim);color:var(--brand);display:grid;place-items:center;margin-bottom:14px}
.road-card h3{font-family:var(--ui);font-size:15px;font-weight:600;letter-spacing:-.01em;margin:0 0 6px}
.road-card p{font-size:13px;color:var(--ink-2);line-height:1.55;margin:0}
.road-card .ph{position:absolute;top:18px;right:18px}

.muted{color:var(--ink-3)} .mono{font-family:var(--mono)}
.row{display:flex;align-items:center;gap:10px} .between{justify-content:space-between} .wrap{flex-wrap:wrap}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--ui);font-size:11px;color:var(--ink-3)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

/* assets: stats, modal, fields */
.statrow{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:16px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:13px 15px;cursor:pointer;transition:.1s;text-align:left;box-shadow:var(--hl)}

.stat .v{font-family:var(--ui);font-weight:600;font-size:23px;margin-top:4px;font-variant-numeric:tabular-nums;letter-spacing:-.03em}
.bulkbar{display:flex;align-items:center;gap:12px;padding:8px 13px;background:var(--brand-dim);border:1px solid rgba(94,106,210,.3);border-radius:8px;margin-bottom:14px;font-size:13px}
.linklike{background:none;border:0;padding:0;font:inherit;color:inherit;cursor:pointer;text-align:left}
.linklike:hover{text-decoration:underline}
.id.linklike{color:var(--brand-2);font-family:var(--ui);font-size:12.5px;font-weight:500}
.ract{width:27px;height:27px;border-radius:6px;border:1px solid transparent;background:transparent;display:grid;place-items:center;color:var(--ink-3);transition:.1s}
.ract:hover{color:var(--ink);background:rgba(255,255,255,.06)}
.ract.del:hover{color:var(--bad);background:var(--bad-dim)}
input[type=checkbox]{accent-color:var(--brand-cta);width:15px;height:15px;cursor:pointer}
.modal-scrim{position:fixed;inset:0;background:rgba(4,5,6,.66);backdrop-filter:blur(3px);z-index:70;display:grid;place-items:center;opacity:0;pointer-events:none;transition:.18s;padding:20px}
.modal-scrim.open{opacity:1;pointer-events:auto}
.modal{width:min(540px,100%);max-height:90vh;overflow:auto;background:#161719;border:1px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow-lg);transform:translateY(10px) scale(.99);transition:.2s}
.modal-scrim.open .modal{transform:none}
.modal-h{display:flex;align-items:flex-start;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
.modal-h h3{margin:0;font-family:var(--ui);font-size:15px;font-weight:600;letter-spacing:-.01em}
.modal-h .sub{font-size:12.5px;color:var(--ink-2);margin-top:3px}
.modal-x{margin-left:auto;width:28px;height:28px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--ink-2);font-size:14px}
.modal-x:hover{color:var(--ink);background:rgba(255,255,255,.05)}
.modal-b{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-family:var(--ui);font-size:11px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-3);font-weight:510}
.field input,.field select,.field textarea{border-radius:6px;border:1px solid var(--line-2);background:var(--panel-2);color:var(--ink);font-family:var(--ui);font-size:13px;padding:8px 11px}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ============================================================ SVG helpers */
function polar(cx,cy,r,a){const rad=(a-90)*Math.PI/180;return[cx+r*Math.cos(rad),cy+r*Math.sin(rad)];}
function arc(cx,cy,r,a0,a1){const[x0,y0]=polar(cx,cy,r,a1),[x1,y1]=polar(cx,cy,r,a0);const big=a1-a0<=180?0:1;return `M${x0} ${y0} A${r} ${r} 0 ${big} 0 ${x1} ${y1}`;}
function gaugeSVG(pct){const s=-120,e=120,sw=e-s;const v=s+(pct/100)*sw;const col=pct>=80?"var(--ok)":pct>=60?"var(--warn)":"var(--bad)";
  return `<svg width="170" height="140" viewBox="0 0 170 140"><path d="${arc(85,90,66,s,e)}" stroke="var(--panel-3)" stroke-width="11" fill="none" stroke-linecap="round"/><path d="${arc(85,90,66,s,v)}" stroke="${col}" stroke-width="11" fill="none" stroke-linecap="round"/></svg>`;}
function areaForecastSVG(hist,fc){const w=620,h=200,pad=18;const all=[...hist,...fc.slice(1)];const mn=Math.min(...all)-3,mx=Math.max(...all)+3,rng=mx-mn;const n=all.length-1,step=(w-pad*2)/n;const X=i=>pad+i*step,Y=v=>h-pad-((v-mn)/rng)*(h-pad*2);
  const hp=hist.map((v,i)=>(i?"L":"M")+X(i)+" "+Y(v)).join(" ");const hi=hist.length-1;const fp=fc.map((v,i)=>(i?"L":"M")+X(hi+i)+" "+Y(v)).join(" ");const ha=hp+` L${X(hi)} ${h-pad} L${X(0)} ${h-pad} Z`;
  let g="";for(let i=0;i<=4;i++){const y=pad+i*((h-pad*2)/4);g+=`<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;}
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" style="overflow:visible">${g}<path d="${ha}" fill="var(--brand)" opacity=".08"/><path d="${hp}" fill="none" stroke="var(--brand)" stroke-width="2.4" stroke-linejoin="round"/><path d="${fp}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-dasharray="5 5" stroke-linejoin="round"/><circle cx="${X(hi)}" cy="${Y(hist[hi])}" r="3.5" fill="var(--brand)"/><circle cx="${X(all.length-1)}" cy="${Y(all[all.length-1])}" r="3.5" fill="var(--accent)"/></svg>`;}

function handleAction(a){

const QUERIES={
  "show DUTs with uptime < 90% this quarter":{summary:`Found <b>3 devices</b> below the 90% uptime threshold this quarter. The <b>TB-04 ECU node</b> is the worst and is also flagged for predicted failure — recommend pulling it before the ECU Boot Stress deadline.`,rows:()=>DATA.duts.filter(d=>d.uptime<90)},
  "which campaigns are at risk this week":{summary:`<b>1 campaign</b> is at risk: <b>ADAS Sensor Fusion v1 (CMP-221)</b> is queued behind <b>TB-09 maintenance</b> and will slip unless the bed returns a day early. CAN-Stack Regression is on track at 78%.`},
  "where should I cut cost":{summary:`<b>TB-07</b> and <b>TB-12</b> have averaged under 30% utilization for 6 weeks. Reallocating load from the overloaded TB-05 onto TB-07 reduces overload risk and frees roughly <b>€1,800/month</b>. See the "Cut cost" recommendation below.`},
  "forecast utilization for next month":{summary:`Utilization is forecast to rise from <b>73%</b> to <b>78%</b> over the next 30 days (±2pt), assuming current campaign load and no hardware changes. Adding one HiL bed would lift the ceiling another ~14%.`}
};
function runQuery(q){const key=q.toLowerCase().trim();
  const m=Object.keys(QUERIES).find(k=>k.toLowerCase()===key)||(key.includes("uptime")?"show DUTs with uptime < 90% this quarter":key.includes("risk")?"which campaigns are at risk this week":(key.includes("cost")||key.includes("cut"))?"where should I cut cost":(key.includes("forecast")||key.includes("utilization"))?"forecast utilization for next month":null);
  if(m){const o=QUERIES[m];aiState={answer:{q:q,summary:o.summary,rows:o.rows?o.rows():null}};render("ai");}
  else{aiState={answer:{q:q,summary:`No exact match in this demo. Try: "Show DUTs with uptime < 90% this quarter", "which campaigns are at risk this week", "where should I cut cost", or "forecast utilization for next month".`}};render("ai");}
}

function drawTopology(){const host=document.getElementById('topoSvg');if(!host)return;const W=host.clientWidth||800,H=360;

  s+=`<circle cx="${cx}" cy="${cy}" r="26" fill="var(--bg-2)" stroke="var(--brand)" stroke-width="1.6"/><text x="${cx}" y="${cy-32}" fill="var(--ink-3)" font-size="10" font-family="var(--mono)" text-anchor="middle">CORE SWITCH</text><text x="${cx}" y="${cy+4}" fill="var(--brand)" font-size="9" font-family="var(--mono)" text-anchor="middle">10GbE</text>`;

  edges.forEach(eg=>{const x=W*eg[1]+34,y=H*eg[2]-30;s+=`<g><rect x="${x-22}" y="${y-12}" width="44" height="24" rx="7" fill="var(--accent-dim)" stroke="var(--accent)" stroke-width="1.1"/><text x="${x}" y="${y+4}" fill="var(--accent)" font-size="9" font-family="var(--mono)" text-anchor="middle">${eg[0]}</text></g>`;});

    </div>
    <span class="eyebrow" style="display:block;margin-top:22px">Documentation</span>
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
      ${["Datasheet.pdf","Calibration certificate.pdf","Wiring schematic.pdf"].map(f=>`<div class="row" style="gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:9px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--ink-3)" stroke-width="1.7"><path d="M6 2h8l4 4v16H6z"/><path d="M14 2v4h4"/></svg><span style="font-size:12.5px">${f}</span><svg style="margin-left:auto;color:var(--ink-3)" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v12M8 11l4 4 4-4M5 21h14"/></svg></div>`).join("")}
    </div>
  </div>`;
}
function openAssetDrawer(tag){drawer.innerHTML=assetDrawer(tag);drawer.classList.add('open');scrim.classList.add('open');}

/* ---- modal ---- */
const mscrim=document.getElementById('mscrim');
function openModal(h){mscrim.innerHTML=`<div class="modal">${h}</div>`;mscrim.classList.add('open');}
function closeModal(){mscrim.classList.remove('open');setTimeout(()=>{if(!mscrim.classList.contains('open'))mscrim.innerHTML='';},220);}
let pendingTags=[];
function assigneeOptions(){return `<optgroup label="Teams">`+DATA.assignees.teams.map(x=>`<option>${x}</option>`).join("")+`</optgroup><optgroup label="People">`+DATA.assignees.people.map(x=>`<option>${x}</option>`).join("")+`</optgroup>`;}
function locationOptions(sel){return DATA.locations.map(x=>`<option ${x===sel?"selected":""}>${x}</option>`).join("");}

function openCheckoutModal(tags){pendingTags=tags;const many=tags.length>1;const a=many?null:assetByTag(tags[0]);
  openModal(`
    <div class="modal-h"><div><h3>Check out ${many?tags.length+" assets":(a.name!=="—"?a.name:a.model)+" · #"+a.tag}</h3><div class="sub">Assign hardware to a tester, team or campaign</div></div><button class="modal-x" data-mclose>✕</button></div>
    <div class="modal-b">
      <div class="field"><label>Check out to</label><select id="coAssignee">${assigneeOptions()}</select></div>
      <div class="field-row">
        <div class="field"><label>Location</label><select id="coLocation">${locationOptions(a?a.location:"")}</select></div>
        <div class="field"><label>Expected checkin</label><input id="coDate" type="date" value="2026-06-30"></div>
      </div>
      <div class="field"><label>Campaign (optional)</label><select id="coCampaign"><option value="">— none —</option>${DATA.campaigns.progress.map(c=>`<option>${c.id} · ${c.title}</option>`).join("")}</select></div>
      <div class="field"><label>Notes</label><textarea id="coNotes" rows="2" placeholder="Optional"></textarea></div>
    </div>
    <div class="modal-f"><button class="btn ghost sm" data-mclose>Cancel</button><button class="btn primary sm" data-confirm-checkout>Confirm checkout</button></div>`);}
function doCheckout(){const who=document.getElementById('coAssignee').value;const loc=document.getElementById('coLocation').value;
  pendingTags.forEach(t=>{const a=assetByTag(t);if(a){a.status="deployed";a.assignee=who;a.location=loc;}});
  const n=pendingTags.length;closeModal();assetState.sel.clear();render("assets");toast(n+" asset"+(n>1?"s":"")+" checked out","Assigned to "+who);}

function openCheckinModal(tag){pendingTags=[tag];const a=assetByTag(tag);
  openModal(`
    <div class="modal-h"><div><h3>Check in ${(a.name!=="—"?a.name:a.model)} · #${a.tag}</h3><div class="sub">Return asset to inventory</div></div><button class="modal-x" data-mclose>✕</button></div>
    <div class="modal-b">
      <div style="font-size:13px;color:var(--ink-2);line-height:1.5">Currently checked out to <b style="color:var(--ink)">${a.assignee||"—"}</b>. Checking it in makes it available for booking again.</div>
      <div class="field"><label>Condition on return</label><select id="ciCond"><option>OK — Ready to Deploy</option><option>Needs calibration / audit</option><option>Fault — Investigating</option></select></div>
    </div>
    <div class="modal-f"><button class="btn ghost sm" data-mclose>Cancel</button><button class="btn accent sm" data-confirm-checkin="${tag}">Confirm checkin</button></div>`);}
function doCheckin(tag){const a=assetByTag(tag);const cond=(document.getElementById('ciCond')||{}).value||"";
  if(a){a.assignee=null;a.status=cond.includes("calibration")||cond.includes("Fault")?"investigating":"ready";if(cond.includes("calibration"))a.audit={due:true,date:"2026-07-01"};}
  closeModal();render("assets");toast("Checked in",a?("#"+a.tag+" returned to inventory"):"Asset returned");}

function nextTag(){const m=DATA.assets.reduce((x,a)=>Math.max(x,parseInt(a.tag)||0),0);return String(m+1).padStart(5,"0");}
function openRegisterModal(){const tag=nextTag();
  openModal(`
    <div class="modal-h"><div><h3>Register equipment</h3><div class="sub">Add a new hardware asset to inventory</div></div><button class="modal-x" data-mclose>✕</button></div>
    <div class="modal-b">
      <div class="field-row"><div class="field"><label>Asset tag</label><input id="rgTag" value="${tag}"></div><div class="field"><label>Serial</label><input id="rgSerial" placeholder="Serial number"></div></div>
      <div class="field-row"><div class="field"><label>Model</label><select id="rgModel">${DATA.models.map(m=>`<option>${m.name}</option>`).join("")}</select></div><div class="field"><label>Category</label><select id="rgCat">${DATA.categories.filter(c=>c.type==="Asset").map(c=>`<option>${c.name}</option>`).join("")}</select></div></div>
      <div class="field-row"><div class="field"><label>Status</label><select id="rgStatus"><option>Ready to Deploy</option><option>Pending</option><option>Investigating</option></select></div><div class="field"><label>Default location</label><select id="rgLoc">${locationOptions("")}</select></div></div>
      <div class="field"><label>Asset name</label><input id="rgName" placeholder="e.g. 7415"></div>
      <div class="field-row"><div class="field"><label>Variant</label><input id="rgVariant" placeholder="e.g. Premiumplus"></div><div class="field"><label>Market</label><input id="rgMarket" placeholder="e.g. USA"></div></div>
    </div>
    <div class="modal-f"><button class="btn ghost sm" data-mclose>Cancel</button><button class="btn primary sm" data-confirm-register>Register asset</button></div>`);}
function doRegister(){const g=id=>document.getElementById(id);
  const a={tag:g('rgTag').value||nextTag(),name:g('rgName').value||g('rgTag').value,serial:g('rgSerial').value||"—",model:g('rgModel').value,cat:g('rgCat').value,status:"ready",assignee:null,location:g('rgLoc').value,cost:"—",value:"—",audit:{due:false,date:"2026-12-01"},cf:{tnum:"—",star:"—",sample:"—",sw:"none",variant:g('rgVariant').value||"—",market:g('rgMarket').value||"—"}};
  DATA.assets.unshift(a);closeModal();assetState.filter="all";render("assets");toast("Asset registered","#"+a.tag+" · "+a.model+" added to inventory");}

mscrim.addEventListener('click',e=>{
  if(e.target===mscrim||e.target.closest('[data-mclose]')){closeModal();return;}
  if(e.target.closest('[data-confirm-checkout]')){doCheckout();return;}
  const ci=e.target.closest('[data-confirm-checkin]');if(ci){doCheckin(ci.dataset.confirmCheckin);return;}
  if(e.target.closest('[data-confirm-register]')){doRegister();return;}
});

/* ---- asset-specific clicks / selection / search ---- */
content.addEventListener('click',e=>{
  const co=e.target.closest('[data-checkout]');if(co){openCheckoutModal([co.dataset.checkout]);return;}
  const ci=e.target.closest('[data-checkin]');if(ci){openCheckinModal(ci.dataset.checkin);return;}
  if(e.target.closest('[data-register]')){openRegisterModal();return;}
  if(e.target.closest('[data-bulk-checkout]')){if(assetState.sel.size)openCheckoutModal([...assetState.sel]);return;}
  if(e.target.closest('[data-bulk-clear]')){assetState.sel.clear();render("assets");return;}
  const ed=e.target.closest('[data-edit]');if(ed){openAssetDrawer(ed.dataset.edit);return;}
  const cl=e.target.closest('[data-clone]');if(cl){toast("Cloned","#"+cl.dataset.clone+" duplicated as draft");return;}
  const dl=e.target.closest('[data-del]');if(dl){const t=dl.dataset.del;DATA.assets=DATA.assets.filter(a=>a.tag!==t);assetState.sel.delete(t);render("assets");toast("Deleted","#"+t+" removed from inventory");return;}
  const as=e.target.closest('[data-asset]');if(as){openAssetDrawer(as.dataset.asset);return;}
});
content.addEventListener('change',e=>{
  const s=e.target.closest('[data-sel]');if(s){if(s.checked)assetState.sel.add(s.dataset.sel);else assetState.sel.delete(s.dataset.sel);render("assets");return;}
  if(e.target.closest('[data-sel-all]')){const on=e.target.checked;if(on)visibleAssets().forEach(a=>assetState.sel.add(a.tag));else assetState.sel.clear();render("assets");return;}
});
content.addEventListener('input',e=>{
  if(e.target.id==="assetSearch"){const v=e.target.value.toLowerCase();document.querySelectorAll('tr[data-search]').forEach(r=>{r.style.display=r.dataset.search.includes(v)?"":"none";});}
});

render('ops');
</script>
</body>
</html>
